<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game of Life</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            color: #fff;
        }
        h1 { margin: 10px 0 5px; }
        #controls { margin-bottom: 10px; }
        #canvas-container { padding: 20px; }
        button {
            padding: 6px 14px;
            margin: 0 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Conway's Game of Life</h1>
    <div id="controls">
        <button id="startStop">Start</button>
        <button id="stepBtn">Step</button>
        <button id="resetBtn">Reset</button>
        <button id="randomBtn">Random</button>
        <label style="margin-left:10px;">Speed: <input type="range" id="speed" min="1" max="30" value="10"></label>
        <label style="margin-left:10px;">Rows: <input type="number" id="rows" min="10" max="200" value="50" style="width:50px;"></label>
        <label>Cols: <input type="number" id="cols" min="10" max="200" value="50" style="width:50px;"></label>
        <label style="margin-left:10px;">Density: <input type="range" id="density" min="10" max="90" value="50"> <span id="densityVal">50%</span></label>
    </div>
    <div id="canvas-container"><canvas id="gameCanvas"></canvas></div>
    <script src="{{ url_for('static', filename='sketch.js') }}?v=2"></script>
</body>
</html>
